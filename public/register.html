<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Create account — NaijaMart</title>
<link rel="stylesheet" href="/css/style.css">
</head>
<body style="background:var(--green-900);min-height:100vh;">

<div class="container" style="padding-top:2rem;">
  <a href="/index.html" class="brand" style="color:#fff;"><span style="color:#fff;">Naija</span><span class="mart" style="color:var(--amber-500);">Mart</span></a>
</div>

<div class="form-card">
  <h1>Create your account</h1>
  <p style="color:var(--ink-soft);margin-top:-0.6rem;margin-bottom:1.2rem;">Registration is required to shop and check out.</p>
  <div class="form-msg" id="msg"></div>
  <form id="register-form">
    <div class="field"><label>Full name</label><input type="text" name="name" required></div>
    <div class="field"><label>Email address</label><input type="email" name="email" required></div>
    <div class="field"><label>Phone number</label><input type="tel" name="phone" placeholder="080..." required></div>
    <div class="field"><label>Password</label><input type="password" name="password" minlength="6" required></div>
    <button type="submit" class="btn btn-primary btn-block" id="submit-btn">Create account</button>
  </form>
  <div class="form-foot">Already have an account? <a href="/login.html">Log in</a></div>
</div>

<script src="/js/api.js"></script>
<script>
document.getElementById('register-form').addEventListener('submit', async (e) => {
  e.preventDefault();
  const msg = document.getElementById('msg');
  const btn = document.getElementById('submit-btn');
  const fd = new FormData(e.target);

  btn.disabled = true;
  btn.textContent = 'Creating account...';
  msg.className = 'form-msg';

  try {
    const data = await api.post('/auth/register', {
      name: fd.get('name'), email: fd.get('email'), phone: fd.get('phone'), password: fd.get('password'),
    });
    setAccessToken(data.accessToken);
    setStoredUser(data.user);
    const params = new URLSearchParams(window.location.search);
    window.location.href = params.get('next') || '/index.html';
  } catch (err) {
    msg.className = 'form-msg error';
    msg.textContent = err.message;
    btn.disabled = false;
    btn.textContent = 'Create account';
  }
});
</script>
</body>
</html>
