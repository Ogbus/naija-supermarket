<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Product — NaijaMart</title>
<link rel="stylesheet" href="/css/style.css">
</head>
<body>

<div class="topbar"><div class="container"><span>Delivering fresh groceries across Nigeria</span><span class="topbar-tag">Free delivery on orders over &#8358;20,000</span></div></div>
<header class="site-header">
  <div class="container">
    <a href="/index.html" class="brand">Naija<span class="mart">Mart</span></a>
    <form id="search-form" class="search-form">
      <input type="search" name="q" placeholder="Search rice, garri, oil, Maggi...">
      <button type="submit">Search</button>
    </form>
    <div class="header-actions" id="auth-area"></div>
    <a href="/cart.html" style="display:flex;align-items:center;gap:0.3rem;">Cart <span class="cart-badge" id="cart-badge">0</span></a>
    <button class="nav-toggle" id="nav-toggle" aria-label="Toggle menu">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
    </button>
  </div>
  <nav class="nav-categories" id="nav-categories"><div class="container" id="category-links"></div></nav>
</header>

<main class="container section">
  <a href="/index.html" style="font-size:0.85rem;">&larr; Back to shop</a>
  <div id="product-detail" style="margin-top:1.2rem;">
    <div class="spinner"></div>
  </div>
</main>

<footer class="site-footer">
  <div class="container">
    <div class="footer-grid">
      <div><h4>NaijaMart</h4><a href="/index.html">Shop</a><a href="/cart.html">Cart</a><a href="/account.html">My account</a></div>
      <div><h4>Help</h4><a href="#">Delivery info</a><a href="#">Returns policy</a><a href="#">Contact us</a></div>
      <div><h4>Company</h4><a href="#">About NaijaMart</a><a href="/login.html">Log in</a></div>
    </div>
    <div class="footer-bottom">&copy; 2026 NaijaMart. Fresh groceries, delivered.</div>
  </div>
</footer>

<script src="/js/api.js"></script>
<script src="/js/layout.js"></script>
<script>
async function loadProduct() {
  const params = new URLSearchParams(window.location.search);
  const id = params.get('id');
  const container = document.getElementById('product-detail');
  if (!id) { container.innerHTML = '<p>Product not found.</p>'; return; }

  try {
    const { product } = await api.get(`/products/${id}`);
    document.title = `${product.name} — NaijaMart`;
    const outOfStock = product.quantity_in_stock <= 0;

    container.innerHTML = `
      <div style="display:grid;grid-template-columns:minmax(0,340px) 1fr;gap:2.2rem;align-items:start;">
        <div class="product-thumb" style="border-radius:var(--radius-lg);border:1px solid var(--line);">
          <img src="${product.image_url || '/images/placeholder.svg'}" alt="${escapeHtml(product.name)}">
        </div>
        <div>
          <div class="product-cat">${escapeHtml(product.category_name || '')}</div>
          <h1 style="margin:0.3rem 0 0.6rem;">${escapeHtml(product.name)}</h1>
          ${product.review_count > 0 ? `
            <div class="rating-line" style="font-size:0.88rem;margin-bottom:0.5rem;">
              ${starsHtml(product.average_rating)}
              <span>${product.average_rating} out of 5 &middot; ${product.review_count} review${product.review_count === 1 ? '' : 's'}</span>
            </div>
          ` : `<div class="rating-line" style="font-size:0.85rem;margin-bottom:0.5rem;">No reviews yet</div>`}
          <p style="color:var(--ink-soft);">${escapeHtml(product.description || '')}</p>
          <div class="price" style="font-size:1.8rem;margin:1rem 0 0.3rem;">${Number(product.price).toLocaleString('en-NG')}</div>
          <div class="product-unit" style="margin-bottom:1rem;">Per ${escapeHtml(product.unit)}</div>
          <span class="stock-tag ${outOfStock ? 'out' : ''}" style="position:static;display:inline-block;margin-bottom:1.2rem;">
            ${outOfStock ? 'Out of stock' : `${product.quantity_in_stock} in stock`}
          </span>
          <div style="display:flex;gap:0.8rem;align-items:center;">
            <div class="qty-control">
              <button type="button" id="qty-minus">-</button>
              <input type="number" id="qty-input" value="1" min="1" max="${product.quantity_in_stock}">
              <button type="button" id="qty-plus">+</button>
            </div>
            <button class="btn btn-primary" id="add-to-cart-btn" ${outOfStock ? 'disabled' : ''}>Add to cart</button>
          </div>
        </div>
      </div>
    `;

    // --- Reviews section ---
    container.insertAdjacentHTML('beforeend', `
      <div class="form-card" style="max-width:none;margin:2.5rem 0 0;">
        <h3>Ratings &amp; reviews</h3>
        <div id="review-form-area"></div>
        <div id="reviews-list" style="margin-top:1rem;"><div class="spinner"></div></div>
      </div>
    `);
    loadReviews(product.id);

    document.getElementById('qty-minus').addEventListener('click', () => {
      const input = document.getElementById('qty-input');
      input.value = Math.max(1, Number(input.value) - 1);
    });
    document.getElementById('qty-plus').addEventListener('click', () => {
      const input = document.getElementById('qty-input');
      input.value = Math.min(product.quantity_in_stock, Number(input.value) + 1);
    });
    document.getElementById('add-to-cart-btn').addEventListener('click', async () => {
      if (!getAccessToken()) {
        window.location.href = `/login.html?next=${encodeURIComponent(window.location.pathname + window.location.search)}`;
        return;
      }
      const qty = Number(document.getElementById('qty-input').value) || 1;
      try {
        await api.post('/cart', { product_id: product.id, quantity: qty });
        showToast('Added to cart');
        refreshCartBadge();
      } catch (err) {
        showToast(err.message, true);
      }
    });
  } catch (err) {
    container.innerHTML = `<div class="empty-state"><h3>Product not found</h3><p>${escapeHtml(err.message)}</p></div>`;
  }
}

let selectedRating = 0;

async function loadReviews(productId) {
  const listEl = document.getElementById('reviews-list');
  const formArea = document.getElementById('review-form-area');
  const currentUser = getStoredUser();

  try {
    const { reviews, average_rating, review_count } = await api.get(`/products/${productId}/reviews`);

    const myReview = currentUser ? reviews.find(r => r.user_id === currentUser.id) : null;
    renderReviewForm(formArea, productId, myReview);

    if (reviews.length === 0) {
      listEl.innerHTML = `<p style="color:var(--ink-soft);font-size:0.9rem;">No reviews yet — be the first to leave one.</p>`;
      return;
    }

    listEl.innerHTML = reviews.map(r => `
      <div class="review-card">
        <div class="review-head">
          ${starsHtml(r.rating)}
          <span class="review-name">${escapeHtml(r.reviewer_name)}</span>
          ${r.verified_purchase ? '<span class="verified-badge">Verified purchase</span>' : ''}
          <span class="review-date">${new Date(r.created_at).toLocaleDateString('en-NG', { year: 'numeric', month: 'short', day: 'numeric' })}</span>
        </div>
        ${r.comment ? `<div class="review-comment">${escapeHtml(r.comment)}</div>` : ''}
        ${currentUser && currentUser.id === r.user_id ? `
          <div class="review-own-actions">
            <span class="remove-link" data-delete-review="${r.id}">Delete my review</span>
          </div>
        ` : ''}
      </div>
    `).join('');

    listEl.querySelectorAll('[data-delete-review]').forEach(link => {
      link.addEventListener('click', async () => {
        if (!confirm('Delete your review?')) return;
        try {
          await api.del(`/products/${productId}/reviews/${link.dataset.deleteReview}`);
          showToast('Review deleted');
          loadReviews(productId);
        } catch (err) {
          showToast(err.message, true);
        }
      });
    });
  } catch (err) {
    listEl.innerHTML = `<p style="color:var(--danger);">${escapeHtml(err.message)}</p>`;
  }
}

function renderReviewForm(formArea, productId, myReview) {
  if (!getAccessToken()) {
    formArea.innerHTML = `<p style="font-size:0.88rem;color:var(--ink-soft);">
      <a href="/login.html?next=${encodeURIComponent(window.location.pathname + window.location.search)}">Log in</a> to leave a review.
    </p>`;
    return;
  }

  selectedRating = myReview ? myReview.rating : 0;

  formArea.innerHTML = `
    <form id="review-form" style="margin-bottom:1rem;">
      <div class="field">
        <label>${myReview ? 'Update your rating' : 'Your rating'}</label>
        <div class="star-input" id="star-input"></div>
      </div>
      <div class="field">
        <label>Comment (optional)</label>
        <textarea name="comment" rows="3" placeholder="What did you think?">${myReview ? escapeHtml(myReview.comment || '') : ''}</textarea>
      </div>
      <div class="form-msg" id="review-msg"></div>
      <button type="submit" class="btn btn-primary btn-sm">${myReview ? 'Update review' : 'Submit review'}</button>
    </form>
  `;

  renderStarInput();

  document.getElementById('review-form').addEventListener('submit', async (e) => {
    e.preventDefault();
    const msg = document.getElementById('review-msg');
    msg.className = 'form-msg';

    if (selectedRating < 1) {
      msg.className = 'form-msg error';
      msg.textContent = 'Please select a star rating.';
      return;
    }

    const comment = new FormData(e.target).get('comment');
    try {
      await api.post(`/products/${productId}/reviews`, { rating: selectedRating, comment });
      showToast('Review saved');
      loadReviews(productId);
    } catch (err) {
      msg.className = 'form-msg error';
      msg.textContent = err.message;
    }
  });
}

function renderStarInput() {
  const el = document.getElementById('star-input');
  const draw = () => {
    el.innerHTML = Array.from({ length: 5 }, (_, i) => {
      const n = i + 1;
      return `<span class="star ${n <= selectedRating ? 'filled' : ''}" data-star="${n}">\u2605</span>`;
    }).join('');
    el.querySelectorAll('[data-star]').forEach(star => {
      star.addEventListener('click', () => { selectedRating = Number(star.dataset.star); draw(); });
    });
  };
  draw();
}
document.addEventListener('DOMContentLoaded', loadProduct);
</script>
</body>
</html>
